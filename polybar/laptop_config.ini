[colors]
background =  #101419
foreground = #DEE1E6
disabled = #28344a
yellow = #F1CF8A
white = #DEE1E6
purple = #C68AEE
green = #76B97F
blue = #70A5EB
red = #E05F65
orange = #F7A36A
rose = #E784A7

[bar/primary]
width = 100%
height = 32pt

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 0
padding-right = 0

module-margin = 0

separator = ""

font-0 = "Hack Nerd Font:style=Regular:size=13;3"
font-1 = "Hack Nerd Font:style=Regular:size=17;3"

modules-left = icon internet_status vpn target
modules-center = xworkspaces
modules-right = brightness pulseaudio battery battery_notification date color_temperature powermenu

cursor-click = pointer
cursor-scroll = pointer

enable-ipc = true

; tray-position = right

; wm-restack = generic
  wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = "‚óÜ"
label-active-underline= ${colors.yellow}
label-active-padding = 1

label-occupied = "‚ĚĖ"
label-occupied-padding = 1

label-empty = "‚óá"
label-empty-foreground = ${colors.white}
label-empty-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

use-ui-max = false
format-volume = "<label-volume><bar-volume> %{F#28344a}|"
label-volume = "  ůįēĺ "
label-volume-foreground = ${colors.purple}

format-muted-prefix = "  ůįĖĀ "
format-muted-foreground = ${colors.purple}
label-muted = "%{F#DEE1E6}Muted %{F#28344a}|"

interval = 10

bar-volume-width = 11
bar-volume-foreground-0 = ${colors.purple}
bar-volume-gradient = false
bar-volume-indicator = ""  
bar-volume-indicator-font = 1 
bar-volume-indicator-foreground = ${colors.purple} 
bar-volume-fill = "‚ĒĀ"
bar-volume-fill-font = 1
bar-volume-empty = "‚ĒĀ" 
bar-volume-empty-font = 1 
bar-volume-empty-foreground = ${colors.white}

[module/date]
type = internal/date
interval = 1

date = %H:%M

label = "  %{F#70A5EB}ůĪĎÉ %{F#DEE1E6}%date%"

[settings]
screenchange-reload = true
pseudo-transparency = true
; vim:ft=dosini

[module/vpn]
type = custom/script
interval = 5
exec = /home/user_replace/.config/polybar/scripts/vpn_status.sh
click-left = /home/user_replace/.config/polybar/scripts/copy_vpn_ip.sh

[module/target]
type = custom/script
interval = 5
exec = /home/user_replace/.config/polybar/scripts/target_status.sh
click-left = /home/user_replace/.config/polybar/scripts/copy_target_ip.sh

[module/internet_status]
type = custom/script
interval = 5
exec = /home/user_replace/.config/polybar/scripts/internet_status.sh
click-left = /home/user_replace/.config/polybar/scripts/copy_local_ip.sh

[module/icon]
type = custom/text
format = " %{F#DEE1E6}ÔĆß  %{F#28344a}|"
click-left = /home/user_replace/.config/rofi/launcher/launcher.sh

[module/powermenu]
type = custom/text
format = " %{F#28344a}| %{F#E05F65}ÔÄĎ  "
click-left = /home/user_replace/.config/rofi/powermenu/powermenu.sh

[module/brightness]
type = custom/script
exec = /home/user_replace/.config/polybar/scripts/brightness_control.sh
scroll-up = /home/user_replace/.config/polybar/scripts/increase_brightness.sh
scroll-down = /home/user_replace/.config/polybar/scripts/decrease_brightness.sh
interval = 0.05

[module/color_temperature]
type = custom/script
exec = bash -c "source /home/user_replace/.config/polybar/scripts/color_temperature_control.sh temperature"
click-left = bash -c "source /home/user_replace/.config/polybar/scripts/color_temperature_control.sh toggle"
scroll-up = bash -c "source /home/user_replace/.config/polybar/scripts/color_temperature_control.sh increase"
scroll-down = bash -c "source /home/user_replace/.config/polybar/scripts/color_temperature_control.sh decrease"
interval = 0.05

[module/battery_notification]
type = custom/script
exec = /home/user_replace/.config/dunst/scripts/battery_notification.sh
interval = 0.5
hidden = true

[module/battery]
type = internal/battery

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = battery_replace
adapter = adapter_replace

;-- Most batteries never hit 100%
full-at = 100

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = " ůįāÉ"    
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1 = " ůįĀĽ"
ramp-capacity-1-foreground = ${colors.orange}
ramp-capacity-2 = " ůįĀĹ"
ramp-capacity-2-foreground = ${colors.yellow}
ramp-capacity-3 = " ůįĀŅ"
ramp-capacity-3-foreground = ${colors.yellow}
ramp-capacity-4 = " ůįāĀ"
ramp-capacity-4-foreground = ${colors.green}
ramp-capacity-5 = " ůįĀĻ"
ramp-capacity-5-foreground = ${colors.green}

animation-charging-0 = " ůįāÜ"
animation-charging-1 = " ůįāą"
animation-charging-2 = " ůįĘĚ"
animation-charging-3 = " ůįāČ"
animation-charging-4 = " ůįāä"
animation-charging-5 = " ůįāÖ"
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

poll-interval = 1
